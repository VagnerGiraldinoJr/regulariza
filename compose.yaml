services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Regulariza}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-8082}}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      SERVER_CITY: ${SERVER_CITY:-Ponta Grossa}
      SERVER_UF: ${SERVER_UF:-PR}
      SERVER_COUNTRY: ${SERVER_COUNTRY:-Brasil}

      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-regulariza}
      DB_USERNAME: ${DB_USERNAME:-regulariza}
      DB_PASSWORD: ${DB_PASSWORD:-regulariza123}

      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-asaas}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      DEFAULT_ANALYST_EMAIL: ${DEFAULT_ANALYST_EMAIL:-analista@cpfclean.com.br}
      RESEARCH_COMMISSION_RATE: ${RESEARCH_COMMISSION_RATE:-0.30}
      INSTALLMENT_COMMISSION_RATE: ${INSTALLMENT_COMMISSION_RATE:-0.40}
      COMMISSION_HOLD_HOURS: ${COMMISSION_HOLD_HOURS:-24}

      ZAPI_INSTANCE: ${ZAPI_INSTANCE:-}
      ZAPI_TOKEN: ${ZAPI_TOKEN:-}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtps}
      MAIL_HOST: ${MAIL_HOST:-smtp.hostinger.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-contato@cpfclean.com.br}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CPF Clean Brasil}

      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${APP_PORT:-8082}:8000'

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ['php', 'artisan', 'queue:work', '--tries=1', '--timeout=120', '--sleep=3']
    environment:
      APP_NAME: ${APP_NAME:-Regulariza}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-8082}}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      SERVER_CITY: ${SERVER_CITY:-Ponta Grossa}
      SERVER_UF: ${SERVER_UF:-PR}
      SERVER_COUNTRY: ${SERVER_COUNTRY:-Brasil}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-regulariza}
      DB_USERNAME: ${DB_USERNAME:-regulariza}
      DB_PASSWORD: ${DB_PASSWORD:-regulariza123}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-asaas}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      DEFAULT_ANALYST_EMAIL: ${DEFAULT_ANALYST_EMAIL:-analista@cpfclean.com.br}
      RESEARCH_COMMISSION_RATE: ${RESEARCH_COMMISSION_RATE:-0.30}
      INSTALLMENT_COMMISSION_RATE: ${INSTALLMENT_COMMISSION_RATE:-0.40}
      COMMISSION_HOLD_HOURS: ${COMMISSION_HOLD_HOURS:-24}
      ZAPI_INSTANCE: ${ZAPI_INSTANCE:-}
      ZAPI_TOKEN: ${ZAPI_TOKEN:-}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN:-}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtps}
      MAIL_HOST: ${MAIL_HOST:-smtp.hostinger.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-contato@cpfclean.com.br}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-CPF Clean Brasil}
      RUN_MIGRATIONS: 'false'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_DATABASE:-regulariza}
      MYSQL_USER: ${DB_USERNAME:-regulariza}
      MYSQL_PASSWORD: ${DB_PASSWORD:-regulariza123}
    volumes:
      - regulariza_mysql_data:/var/lib/mysql
    ports:
      - '${FORWARD_DB_PORT:-3308}:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-p${MYSQL_ROOT_PASSWORD:-root123}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - regulariza_redis_data:/data
    ports:
      - '${FORWARD_REDIS_PORT:-6381}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  regulariza_mysql_data:
  regulariza_redis_data:
